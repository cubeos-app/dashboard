# =============================================================================
# CubeOS Dashboard Pipeline - Build, Package, Deploy
# =============================================================================
#
# DEPLOY STRATEGY (via SSH to Pi):
#   1. Stop watchdog timer (prevents interference during deploy)
#   2. stack rm -> wait for drain
#   3. stack deploy with local-only image (no registry prefix)
#   4. Wait for convergence + HTTP health check
#   5. Restart watchdog timer (always, even on failure — via after_script)
#
# =============================================================================

stages:
  - validate
  - build
  - package
  - deploy

variables:
  GHCR_IMAGE: "ghcr.io/cubeos-app/dashboard"
  BUILDER_IMAGE: "ghcr.io/cubeos-app/dashboard-builder"
  LOCAL_IMAGE: "cubeos-dashboard"
  SERVICE_NAME: "cubeos-dashboard_cubeos-dashboard"
  STACK_NAME: "cubeos-dashboard"
  COMPOSE_DIR: "/cubeos/coreapps/cubeos-dashboard/appconfig"
  HEALTH_URL: "http://127.0.0.1:6011/"
  CONVERGE_TIMEOUT: "180"
  HEALTH_TIMEOUT: "90"

# -----------------------------------------------------------------------------
# CONSISTENCY CHECK — CubeOS critical rules gate
# -----------------------------------------------------------------------------
lint:consistency:
  stage: validate
  image: alpine:latest
  tags: [multiarch]
  variables:
    GIT_DEPTH: 50
  before_script:
    - apk add --no-cache git bash
  script:
    - |
      bash <<'CONSISTENCY_CHECK'
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        DIFF=$(git diff HEAD~1 HEAD -- . ':!.gitlab-ci.yml' 2>/dev/null || echo "")
      else
        git fetch origin main --depth=50 2>/dev/null || true
        DIFF=$(git diff origin/main...HEAD -- . ':!.gitlab-ci.yml' 2>/dev/null || git diff HEAD~1 HEAD -- . ':!.gitlab-ci.yml' 2>/dev/null || echo "")
      fi

      # Filter out the consistency check script's own lines to prevent false positives
      DIFF=$(echo "$DIFF" | grep -v 'VIOLATIONS+=\|WARNINGS+=\|CONSISTENCY_CHECK\|grep.*-[cq]E' || echo "$DIFF")

      if [ -z "$DIFF" ]; then
        echo "No diff to check. Skipping."
        exit 0
      fi

      REPO_NAME="dashboard"
      VIOLATIONS=()
      WARNINGS=()

      # Rule 1: HAL boundary
      if echo "$DIFF" | grep -qE '^\+.*\bnsenter\b'; then
        VIOLATIONS+=("HAL boundary: nsenter found — all host ops must go through HAL")
      fi
      if echo "$DIFF" | grep -qE '^\+.*exec\.Command.*systemctl'; then
        VIOLATIONS+=("HAL boundary: direct systemctl call — use HAL REST endpoint")
      fi

      # Rule 2: CGO
      if echo "$DIFF" | grep -qE '^\+.*import "C"'; then
        VIOLATIONS+=("CGO: import C found — all Go must compile with CGO_ENABLED=0")
      fi

      # Rule 3: docker run
      if echo "$DIFF" | grep -E '^\+\s*docker run ' | grep -qvE '(#|comment)'; then
        VIOLATIONS+=("Orchestration: docker run found — use docker stack deploy")
      fi

      # Rule 6: Pi-hole deprecated CLI
      if echo "$DIFF" | grep -qE '^\+.*(pihole -a|pihole --|pihole reloaddns|docker exec.*pihole.*--config)'; then
        VIOLATIONS+=("Pi-hole: deprecated CLI — use v6 REST API at port 6001")
      fi

      # Rule 7: YouTrack issue ID
      if ! echo "$CI_COMMIT_MESSAGE" | grep -qE '\[CUBEOS-[0-9]+\]'; then
        if ! echo "$CI_COMMIT_MESSAGE" | grep -qE '^chore: bump version'; then
          WARNINGS+=("Traceability: commit has no [CUBEOS-XX] reference")
        fi
      fi

      echo ""
      echo "=== Consistency Check: $REPO_NAME ==="
      if [ ${#VIOLATIONS[@]} -gt 0 ]; then
        echo "VIOLATIONS (pipeline blocked):"
        for v in "${VIOLATIONS[@]}"; do echo "  [BLOCK] $v"; done
      fi
      if [ ${#WARNINGS[@]} -gt 0 ]; then
        echo "WARNINGS (review recommended):"
        for w in "${WARNINGS[@]}"; do echo "  [WARN]  $w"; done
      fi
      if [ ${#VIOLATIONS[@]} -eq 0 ] && [ ${#WARNINGS[@]} -eq 0 ]; then
        echo "  All checks passed."
      fi
      echo ""
      if [ ${#VIOLATIONS[@]} -gt 0 ]; then
        echo "FAILED: ${#VIOLATIONS[@]} violation(s). Fix before merging."
        exit 1
      fi
      echo "PASSED"
      CONSISTENCY_CHECK
  rules:
    - when: always
  allow_failure: false

# -----------------------------------------------------------------------------
# BUILD - Build static files (for MR validation)
# -----------------------------------------------------------------------------
build:
  stage: build
  tags: [multiarch]
  image: node:20-alpine
  script:
    - npm ci
    - npm run build
    - ls -la dist/
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# -----------------------------------------------------------------------------
# PACKAGE - Build multi-arch Docker image
# -----------------------------------------------------------------------------
package:
  stage: package
  tags: [multiarch]
  image: docker:24
  before_script:
    - echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USER" --password-stdin
    - docker buildx create --name mybuilder --driver docker-container --use 2>/dev/null || docker buildx use mybuilder
    - docker buildx inspect --bootstrap
  script:
    - echo "Building dashboard image..."
    - >-
      docker buildx build
      --platform linux/amd64,linux/arm64
      --build-arg BUILDER_IMAGE=${BUILDER_IMAGE}:latest
      --push
      -t ${GHCR_IMAGE}:${CI_COMMIT_SHORT_SHA}
      -t ${GHCR_IMAGE}:latest
      .
    - echo "Pushed ${GHCR_IMAGE}:${CI_COMMIT_SHORT_SHA}"
  after_script:
    - docker buildx rm mybuilder 2>/dev/null || true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# -----------------------------------------------------------------------------
# DEPLOY — via SSH to Pi
# -----------------------------------------------------------------------------
deploy:
  stage: deploy
  tags: [multiarch]
  image: alpine:latest
  needs:
    - package
  before_script:
    - apk add --no-cache openssh-client curl
    - eval $(ssh-agent -s)
    - echo "$CI_DEPLOY_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    # Resolve deploy target — try primary, fall back to alt interface
    - |
      _RESOLVED=""
      for ADDR in ${PI_DEPLOY_ADDR} ${PI_DEPLOY_ADDR_ALT}; do
        [ -z "$ADDR" ] && continue
        ssh-keyscan -H "$ADDR" >> ~/.ssh/known_hosts 2>/dev/null || true
        if ssh -o ConnectTimeout=5 -o BatchMode=yes "cubeos@${ADDR}" true 2>/dev/null; then
          _RESOLVED="$ADDR"
          break
        fi
      done
      if [ -z "$_RESOLVED" ]; then
        echo "ERROR: Pi unreachable at ${PI_DEPLOY_ADDR} / ${PI_DEPLOY_ADDR_ALT}"
        exit 1
      fi
      export PI_DEPLOY_ADDR="$_RESOLVED"
      export PI_DEPLOY_HOST="cubeos@${_RESOLVED}"
      echo "Deploy target: ${PI_DEPLOY_HOST}"
  script:
    - scp scripts/ci-deploy.sh ${PI_DEPLOY_HOST}:/tmp/ci-deploy-dashboard.sh
    - |
      ssh -o ServerAliveInterval=15 ${PI_DEPLOY_HOST} \
        "GHCR_TOKEN='${GHCR_TOKEN}' \
         GHCR_USER='${GHCR_USER}' \
         GHCR_IMAGE='${GHCR_IMAGE}' \
         CI_COMMIT_SHORT_SHA='${CI_COMMIT_SHORT_SHA}' \
         bash /tmp/ci-deploy-dashboard.sh"
    - ssh ${PI_DEPLOY_HOST} "rm -f /tmp/ci-deploy-dashboard.sh"
  # ALWAYS restart watchdog, even on failure — separate SSH call
  after_script:
    - |
      # Re-setup SSH agent for after_script (GitLab runs this in a new shell)
      apk add --no-cache openssh-client 2>/dev/null || true
      eval $(ssh-agent -s)
      echo "$CI_DEPLOY_SSH_KEY" | tr -d '\r' | ssh-add -
      mkdir -p ~/.ssh && chmod 700 ~/.ssh
      # Resolve deploy target — try both interfaces
      _RESOLVED=""
      for ADDR in ${PI_DEPLOY_ADDR} ${PI_DEPLOY_ADDR_ALT}; do
        [ -z "$ADDR" ] && continue
        ssh-keyscan -H "$ADDR" >> ~/.ssh/known_hosts 2>/dev/null || true
        if ssh -o ConnectTimeout=5 -o BatchMode=yes "cubeos@${ADDR}" true 2>/dev/null; then
          _RESOLVED="$ADDR"
          break
        fi
      done
      if [ -n "$_RESOLVED" ]; then
        echo "=== Restarting watchdog ==="
        ssh -o ConnectTimeout=10 "cubeos@${_RESOLVED}" \
          "sudo systemctl start cubeos-watchdog.timer 2>/dev/null || true; echo '  Watchdog timer restarted'"
      else
        echo "WARNING: Could not reach Pi for watchdog restart"
      fi
      kill $SSH_AGENT_PID 2>/dev/null || true
  environment:
    name: production
    url: http://cubeos.cube
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success
